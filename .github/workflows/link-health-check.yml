name: Link Health Check

on:
  # Run on PRs that modify resource data files or content citation files
  pull_request:
    paths:
      - 'src/data/resources/**/*.json'
      - 'src/content/resources/**/*.ts'
      - 'src/content/topics/**/*.ts'
      - 'scripts/check-links.mjs'
  
  # Run nightly at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run link checker
        id: check
        run: node scripts/check-links.mjs
        continue-on-error: true
      
      - name: Upload link report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-report
          path: public/link-report.json
          retention-days: 30
      
      - name: Comment on PR (if failed)
        if: steps.check.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('public/link-report.json', 'utf8'));
            
            const failed = report.results.filter(r => !r.ok);
            const tierAFailed = failed.filter(r => r.trustTier === 'A');
            const tierBFailed = failed.filter(r => r.trustTier === 'B');
            
            let comment = '## ❌ Link Health Check Failed\n\n';
            comment += `**Summary:**\n`;
            comment += `- Total links checked: ${report.totalChecked}\n`;
            comment += `- Failed: ${report.failed} (${(report.failureRate * 100).toFixed(2)}%)\n`;
            comment += `- Critical (Tier A) failures: ${tierAFailed.length}\n`;
            comment += `- Warning (Tier B) failures: ${tierBFailed.length}\n\n`;
            
            if (tierAFailed.length > 0) {
              comment += '### 🚨 Critical Link Failures (Tier A)\n\n';
              tierAFailed.slice(0, 10).forEach(item => {
                comment += `- **${item.source}** \`${item.type}\`\n`;
                comment += `  - URL: ${item.url}\n`;
                comment += `  - Error: ${item.error || 'HTTP ' + item.status}\n\n`;
              });
              
              if (tierAFailed.length > 10) {
                comment += `_... and ${tierAFailed.length - 10} more critical failures_\n\n`;
              }
            }

            if (tierBFailed.length > 0) {
              comment += '### ⚠️ Non-Critical Link Failures (Tier B)\n\n';
              tierBFailed.slice(0, 10).forEach(item => {
                comment += `- **${item.source}** \`${item.type}\`\n`;
                comment += `  - URL: ${item.url}\n`;
                comment += `  - Error: ${item.error || 'HTTP ' + item.status}\n\n`;
              });

              if (tierBFailed.length > 10) {
                comment += `_... and ${tierBFailed.length - 10} more non-critical failures_\n\n`;
              }
            }
            
            comment += '\n📄 Download the full report from the workflow artifacts.\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Create issue for broken links (scheduled run)
        if: steps.check.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('public/link-report.json', 'utf8'));

            const failed = report.results.filter(r => !r.ok);
            const tierAFailed = failed.filter(r => r.trustTier === 'A');
            const tierBFailed = failed.filter(r => r.trustTier === 'B');

            const date = new Date(report.timestamp).toISOString().split('T')[0];
            const title = `🔗 Broken Links Detected — ${date}`;

            let body = `## Link Health Check — ${date}\n\n`;
            body += `**Summary:**\n`;
            body += `- Total links checked: ${report.totalChecked}\n`;
            body += `- Failed: ${report.failed} (${(report.failureRate * 100).toFixed(2)}%)\n`;
            body += `- Critical (Tier A) failures: ${tierAFailed.length}\n`;
            body += `- Warning (Tier B) failures: ${tierBFailed.length}\n\n`;

            if (tierAFailed.length > 0) {
              body += '### 🚨 Critical Link Failures (Tier A)\n\n';
              tierAFailed.forEach(item => {
                body += `- **${item.source}** \`${item.type}\`\n`;
                body += `  - URL: ${item.url}\n`;
                body += `  - Error: ${item.error || 'HTTP ' + item.status}\n\n`;
              });
            }

            if (tierBFailed.length > 0) {
              body += '### ⚠️ Non-Critical Link Failures (Tier B)\n\n';
              tierBFailed.forEach(item => {
                body += `- **${item.source}** \`${item.type}\`\n`;
                body += `  - URL: ${item.url}\n`;
                body += `  - Error: ${item.error || 'HTTP ' + item.status}\n\n`;
              });
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${context.runId}`;
            body += `\n📄 Download the full report from the [workflow run](${runUrl}).\n`;

            // Ensure the label exists before using it
            const LABEL = 'broken-links';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: LABEL,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: LABEL,
                color: 'd93f0b',
                description: 'Automated: broken link detected by nightly link health check',
              });
            }

            // Update the existing open issue if present, otherwise create a new one
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: LABEL,
              state: 'open',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                title,
                body,
              });
              console.log(`Updated existing issue #${existing.data[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [LABEL],
              });
              console.log(`Created new issue #${issue.data.number}`);
            }
      
      - name: Fail workflow if links are broken
        if: steps.check.outcome == 'failure'
        run: |
          echo "Link health check failed. Please review the report and fix broken links."
          exit 1
